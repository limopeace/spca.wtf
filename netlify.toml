# Netlify configuration file for Next.js static export
[build]
  # Directory where your project is located
  base = ""
  
  # Command to build your site - specifically for production builds
  command = "npm run build:prod"
  
  # Directory that contains the deploy-ready files
  publish = "out"
  
  # Default build environment variables
  environment = { NODE_ENV = "production", NEXT_PUBLIC_ENV = "production" }

# Use the NextJS plugin for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Specify where functions are located
[functions]
  directory = "netlify/functions"
  
# Handle 404 errors
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Handle SPA-like behavior for the home page
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200 