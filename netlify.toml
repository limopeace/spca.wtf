# Netlify configuration file for Next.js static export
[build]
  # Directory where your project is located
  base = ""
  
  # Command to build your site - for Next.js static export
  command = "npm run build"
  
  # Directory that contains the deploy-ready files
  publish = "out"
  
  # Default build environment variables
  environment = { NODE_VERSION = "18" }

# Use the NextJS plugin for Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Specify where functions are located
[functions]
  directory = "netlify/functions"
  
# Handle SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200 